[experiment]
tasks = ["wikitext2"]
seed = 42
device = "cuda"
epochs = 10

[model]
type = "rope"
vocabulary_size = 40479
embedding_size = 512
sequence_length = 255
num_heads = 4
num_layers = 3
rope_theta = 10000.0
intermediate_size = 2048
tie_word_embeddings = true

[data]
batch_size = 8
num_workers = 0
tokenizer_path = "./data/wikitext2_tokenizer.json"

[optimizer]
name = "ARS2C-AR-GSAM"
lr = 0.001
betas = [0.9, 0.95]
rho = 0.3
k = 1
alpha = 0.0
adaptive_sync = true
adaptive_lambda = 0.5
adaptive_gamma = 2.0
adaptive_beta = 0.9
beta1_min = 0.5
beta1_max = 0.9995
beta2_min = 0.5
beta2_max = 0.9995
rho_kappa = 0.01
rho_eta = 0.1
rho_min = 0.01
rho_max = 1.0
