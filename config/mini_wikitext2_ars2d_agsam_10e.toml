[experiment]
tasks = ["wikitext2"]
seed = 42
device = "cuda"
epochs = 10

[model]
type = "rope"
vocabulary_size = 40479
embedding_size = 128
sequence_length = 128
num_heads = 4
num_layers = 2
rope_theta = 10000.0
intermediate_size = 256
tie_word_embeddings = true

[data]
batch_size = 16
num_workers = 0
tokenizer_path = "./data/wikitext2_tokenizer.json"

[optimizer]
name = "ARS2D"
lr = 0.001
betas = [0.9, 0.95]
rho = 0.3
k = 1
alpha = 0.0
adaptive_sync = true
adaptive_lambda = 0.5
adaptive_gamma = 2.0
adaptive_beta = 0.9
